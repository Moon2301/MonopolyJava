<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; /* Light Gray */
        }
        .clean-card {
            background: white;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .primary-btn {
            background-color: #1FB25A; /* Monopoly Green */
            transition: background-color 0.2s;
        }
        .primary-btn:hover {
            background-color: #1a9a4d;
        }
        .input-field {
            border: 1px solid #d1d5db;
            transition: border-color 0.2s, ring 0.2s;
        }
        .input-field:focus {
            border-color: #1FB25A;
            box-shadow: 0 0 0 4px rgba(31, 178, 90, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login Container -->
    <div class="clean-card rounded-xl w-full max-w-md p-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Sign In</h1>
            <p class="text-gray-500 mt-2">Welcome to Monopoly Online</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1" for="email">Email</label>
                <div class="relative">
                    <i class="ph ph-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="email" id="email" class="input-field w-full pl-10 pr-4 py-2.5 rounded-lg text-gray-900 placeholder-gray-400" placeholder="your@email.com" required>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1" for="password">Password</label>
                <div class="relative">
                    <i class="ph ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="password" id="password" class="input-field w-full pl-10 pr-4 py-2.5 rounded-lg text-gray-900 placeholder-gray-400" placeholder="••••••••" required>
                </div>
            </div>
            
            <div id="loginError" class="text-red-600 text-sm font-medium hidden text-center bg-red-50 p-3 rounded-lg border border-red-200 uppercase tracking-tight">
                Invalid credentials
            </div>
            
            <button type="submit" class="primary-btn w-full py-3 text-white font-bold rounded-lg shadow-md hover:shadow-lg transition-all focus:ring-4 focus:ring-green-100 uppercase tracking-wider">
                Sign In
            </button>
            
            <p class="text-center text-sm text-gray-600">
                Don't have an account? 
                <a href="/auth/register.html" class="text-green-600 hover:text-green-700 font-bold ml-1 transition-colors">Sign Up</a>
            </p>
        </form>
    </div>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

     const loginForm = document.getElementById('loginForm');
     const loginError = document.getElementById('loginError');

     loginForm.addEventListener('submit', async (e) => {

         e.preventDefault();
         loginError.classList.add('hidden');

         const email = document.getElementById('email').value;
         const password = document.getElementById('password').value;

         try {

             const res = await fetch('/api/auth/login', {
                 method: 'POST',
                 headers: {
                     'Content-Type': 'application/json'
                 },
                 body: JSON.stringify({
                     email,
                     password
                 })
             });

             const data = await res.json();

             if (res.ok && data.token) {

                 localStorage.setItem("authToken", data.token);
                 localStorage.setItem("userRole", data.role);

                 if (data.role === "ADMIN") {
                     window.location.href = "/admin/index.html";
                 } else {
                     window.location.href = "/home/home.html";
                 }

             } else {

                 loginError.textContent = data.error || "Login failed";
                 loginError.classList.remove("hidden");

             }

         } catch (err) {

             loginError.textContent = "Server connection error";
             loginError.classList.remove("hidden");

         }

     });

 });
    </script>
</body>
</html>
