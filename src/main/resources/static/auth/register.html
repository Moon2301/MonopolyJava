<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Join Game</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; /* Light Gray */
        }
        .clean-card {
            background: white;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .primary-btn {
            background-color: #E21B23; /* Monopoly Red */
            transition: background-color 0.2s;
        }
        .primary-btn:hover {
            background-color: #c5161d;
        }
        .input-field {
            border: 1px solid #d1d5db;
            transition: border-color 0.2s, ring 0.2s;
        }
        .input-field:focus {
            border-color: #E21B23;
            box-shadow: 0 0 0 4px rgba(226, 27, 35, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Registration Container -->
    <div class="clean-card rounded-xl w-full max-w-md p-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Create Account</h1>
            <p class="text-gray-500 mt-2">Join the ultimate Monopoly experience</p>
        </div>
        
        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1" for="username">Username</label>
                <div class="relative">
                    <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="text" id="username" class="input-field w-full pl-10 pr-4 py-2.5 rounded-lg text-gray-900 placeholder-gray-400" placeholder="MrMonopoly" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1" for="email">Email Address</label>
                <div class="relative">
                    <i class="ph ph-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="email" id="email" class="input-field w-full pl-10 pr-4 py-2.5 rounded-lg text-gray-900 placeholder-gray-400" placeholder="your@email.com" required>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1" for="password">Password</label>
                <div class="relative">
                    <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="password" id="password" class="input-field w-full pl-10 pr-4 py-2.5 rounded-lg text-gray-900 placeholder-gray-400" placeholder="••••••••" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1" for="confirmPassword">Confirm Password</label>
                <div class="relative">
                    <i class="ph ph-check-circle absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="password" id="confirmPassword" class="input-field w-full pl-10 pr-4 py-2.5 rounded-lg text-gray-900 placeholder-gray-400" placeholder="••••••••" required>
                </div>
            </div>
            
            <div id="registerSuccess" class="text-green-600 text-sm font-medium hidden text-center bg-green-50 p-3 rounded-lg border border-green-200 uppercase tracking-tight">
                Account created! Redirecting...
            </div>
            <div id="registerError" class="text-red-600 text-sm font-medium hidden text-center bg-red-50 p-3 rounded-lg border border-red-200 uppercase tracking-tight">
                An error occurred
            </div>
            
            <button type="submit" class="primary-btn w-full py-3 text-white font-bold rounded-lg shadow-md hover:shadow-lg transition-all focus:ring-4 focus:ring-red-100 uppercase tracking-wider mt-4">
                Sign Up
            </button>
            
            <p class="text-center text-sm text-gray-600">
                Already have an account? 
                <a href="/auth/login.html" class="text-red-600 hover:text-red-700 font-bold ml-1 transition-colors">Log In</a>
            </p>
        </form>
    </div>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('registerForm');
            const registerError = document.getElementById('registerError');
            const registerSuccess = document.getElementById('registerSuccess');

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                registerError.classList.add('hidden');
                registerSuccess.classList.add('hidden');
                
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (password !== confirmPassword) {
                    registerError.textContent = 'Passwords do not match!';
                    registerError.classList.remove('hidden');
                    return;
                }

                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, email, password })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok) {
                        registerSuccess.classList.remove('hidden');
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 2000);
                    } else {
                        registerError.textContent = data.error || 'Registration failed';
                        registerError.classList.remove('hidden');
                    }
                } catch (err) {
                    registerError.textContent = 'Server connection error';
                    registerError.classList.remove('hidden');
                }
            });
        });
    </script>
</body>
</html>
