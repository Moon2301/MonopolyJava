<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Home</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6;
        }
        .clean-card {
            background: white;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .nav-item {
            transition: all 0.2s;
        }
        .nav-item:hover {
            background-color: #f9fafb;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <i class="ph ph-game-controller text-2xl text-green-600"></i>
                    <span class="font-black text-xl text-gray-900 tracking-tight">MONOPOLY</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 px-3 py-1 bg-gray-100 rounded-full text-xs font-bold text-gray-700">
                        <i class="ph ph-user"></i>
                        <span id="userEmailDisplay">Tycoon</span>
                    </div>
                    <button id="logoutBtn" class="text-sm font-bold text-red-600 hover:text-red-700 transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow p-6">
        <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Dashboard Column -->
            <div class="lg:col-span-2 space-y-6">
                <div class="clean-card rounded-2xl p-8">
                    <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Welcome Back!</h1>
                    <p class="text-gray-500 mb-8">Ready for your next move on the board?</p>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button class="p-6 bg-green-600 text-white rounded-xl shadow-lg hover:bg-green-700 transition-all flex items-center gap-4">
                            <i class="ph ph-play-circle text-4xl"></i>
                            <div class="text-left">
                                <div class="font-bold text-lg">Start Game</div>
                                <div class="text-xs text-green-100">Find a match now</div>
                            </div>
                        </button>
                        <button class="p-6 bg-white border border-gray-200 text-gray-900 rounded-xl shadow hover:bg-gray-50 transition-all flex items-center gap-4">
                            <i class="ph ph-users text-4xl text-blue-600"></i>
                            <div class="text-left">
                                <div class="font-bold text-lg">Friends</div>
                                <div class="text-xs text-gray-500">3 online now</div>
                            </div>
                        </button>
                    </div>
                </div>

                <div class="clean-card rounded-2xl p-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Recent Actvity</h2>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-green-100 text-green-700 rounded-full flex items-center justify-center font-bold">W</div>
                                <div>
                                    <div class="font-bold text-sm">Won vs Player_X</div>
                                    <div class="text-xs text-gray-500">2 hours ago</div>
                                </div>
                            </div>
                            <div class="font-bold text-green-600">+$250</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats Column -->
            <div class="space-y-6">
                <div class="clean-card rounded-2xl p-6">
                    <div class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Your Balance</div>
                    <div class="text-4xl font-black text-gray-900 mb-2">$14,250</div>
                    <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-yellow-400 w-3/4"></div>
                    </div>
                </div>

                <div class="clean-card rounded-2xl p-6">
                    <div class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Current Rank</div>
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-purple-600 text-white rounded-lg flex items-center justify-center text-2xl">
                            <i class="ph ph-crown"></i>
                        </div>
                        <div>
                            <div class="font-extrabold text-gray-900">MASTER</div>
                            <div class="text-xs text-gray-500 underline cursor-pointer">View Leaderboard</div>
                        </div>
                    </div>
                </div>
                
                <button class="w-full py-3 border border-gray-200 rounded-xl font-bold text-gray-600 hover:bg-white hover:shadow transition-all">
                    Profile Settings
                </button>
            </div>

        </div>
    </main>

    <!-- Auth Protection Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.replace('/auth/login.html');
                return;
            }

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('userEmailDisplay').textContent = payload.sub || 'Tycoon';
            } catch (e) {
                console.error("Token format error", e);
            }

            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('authToken');
                localStorage.removeItem('userRole');
                window.location.href = '/auth/login.html';
            });
        });
    </script>
</body>
</html>
