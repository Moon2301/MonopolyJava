<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả giao dịch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/topup.css">
</head>
<body>
<main class="topup-page" style="text-align: center; max-width: 500px;">
    <div class="topup-card featured" id="resultCard" style="display: none;">
        <div id="iconContainer" style="font-size: 72px; margin-bottom: 20px;"></div>
        <h1 id="resultTitle" style="font-size: 36px; margin-bottom: 10px;">Đang tải...</h1>
        <p id="resultMessage" class="topup-subtitle" style="margin-bottom: 30px;"></p>
        
        <button type="button" id="returnHomeBtn" style="background: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.3s;">Quay về Sảnh Chính</button>
    </div>
</main>
<script src="/js/topup-result.js"></script>
</body>
</html>
