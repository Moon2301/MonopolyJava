<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Game Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/game-board.css">
</head>
<body>
<main class="game-container">
    <aside class="left-panel glass-panel">
        <div class="panel-header">
            <p class="eyebrow">Game Chat</p>
            <h1>Ban Tro Chuyen</h1>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <form id="chatForm" class="chat-form">
            <input id="chatInput" type="text" placeholder="Nhap tin nhan..." autocomplete="off">
            <button type="submit">Gui</button>
        </form>
    </aside>

    <section class="board-container">
        <article class="player-info top-left glass-panel" id="playerCard1"></article>
        <article class="player-info top-right glass-panel" id="playerCard2"></article>
        <article class="player-info bottom-left glass-panel" id="playerCard3"></article>
        <article class="player-info bottom-right glass-panel" id="playerCard4"></article>

        <div class="board-stage">
            <div id="monopolyBoard" class="monopoly-board"></div>
            <div id="playerTokens" class="player-tokens"></div>

            <div class="board-center">
                <div class="center-brand">
                    <span>MONOPOLY</span>
                </div>
                <div id="diceArea" class="dice-area">
                    <div class="dice-label">Dice Roll</div>
                    <div class="dice-cubes">
                        <div id="die1" class="die">3</div>
                        <div id="die2" class="die">5</div>
                    </div>
                    <div id="diceTotal" class="dice-total">Tong: 8</div>
                </div>
            </div>
        </div>
    </section>

    <aside class="right-panel glass-panel">
        <div class="panel-header">
            <p class="eyebrow">Game Actions</p>
            <h2>Dieu Khien</h2>
        </div>
        <div class="action-stack">
            <button id="rollDiceButton" type="button" class="action-button primary">Roll Dice</button>
            <button type="button" class="action-button">End Turn</button>
            <button type="button" class="action-button">Buy Property</button>
            <button type="button" class="action-button">Upgrade</button>
        </div>
        <div class="turn-indicator">
            <span class="turn-label">Current Turn</span>
            <strong id="currentTurnLabel">Player1</strong>
        </div>
    </aside>
</main>
<script src="/js/game-board.js"></script>
</body>
</html>
