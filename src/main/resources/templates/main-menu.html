<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly — Trang chủ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main-menu.css">
    <script>
        if (!sessionStorage.getItem("accountId")) {
            window.location.replace("/login");
        }
    </script>
</head>
<body>
<div class="home-menu">
    <div class="backdrop-shape shape-a"></div>
    <div class="backdrop-shape shape-b"></div>
    <div class="backdrop-shape shape-c"></div>

    <header class="top-header">
        <section class="player-banner" id="playerProfileBanner" data-route="/profile" role="link" tabindex="0" title="Hồ sơ cá nhân" aria-label="Mở hồ sơ cá nhân" style="cursor: pointer;">
            <div class="player-avatar-frame">
                <img class="player-avatar" id="playerAvatar" src="/images/avatar-default.png" alt="Avatar">
            </div>
            <div class="player-info">
                <div class="player-name-ribbon" id="playerName">Người chơi</div>
                <div class="player-stats">
                    <span class="stat-pill" style="display: flex; gap: 5px; align-items: center;">
                        <strong id="playerCoins">0</strong><em>Xu</em>
                        <button type="button" data-route="/topup" class="btn-topup" style="background:#ff9800; border:none; border-radius:50%; width:20px; height:20px; color:white; cursor:pointer; font-weight:bold; font-size:14px; line-height:20px; text-align:center; padding:0; margin-left: 5px;" title="Nạp Xu">+</button>
                    </span>
                    <span class="stat-pill"><strong id="playerTickets">0</strong><em>Vé</em></span>
                </div>
            </div>
        </section>

        <div class="title-ribbon">MAIN MENU</div>

        <nav class="header-icons header-icons--compact" aria-label="Lối tắt">
            <button type="button" class="circle-icon icon-friends" id="openFriendsBtn" data-route="/friends" aria-label="Bạn bè" title="Quản lý bạn bè" style="position: relative;">
                <span>👥</span>
                <span id="friendBadge" class="friend-badge" hidden aria-live="polite">0</span>
            </button>
            <button type="button" class="circle-icon icon-shop" data-route="/shop" aria-label="Cửa hàng">
        <nav class="header-icons" aria-label="Dieu huong dau trang">
            <button type="button" class="circle-icon icon-friends" id="openFriendsBtn" aria-label="Ban be" title="Quản lý bạn bè" style="position: relative;">
                <span>👥</span>
                <span id="friendBadge" style="display: none; position: absolute; top: -5px; right: -5px; background: #ff5252; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; font-weight: bold; justify-content: center; align-items: center; border: 2px solid var(--bg-dark, #2a2a3e);">0</span>
            </button>
            <button type="button" class="circle-icon icon-shop" data-route="/shop" aria-label="Cua hang">
                <span>🛒</span>
            </button>
            <button type="button" class="circle-icon icon-topup" data-route="/topup" aria-label="Nap tien" title="Nạp Xu">
                <span>💰</span>
            </button>
            <button type="button" class="circle-icon close icon-close" data-route="/login" aria-label="Đăng xuất">
                <span>✕</span>
            </button>
        </nav>
    </header>

    <main class="menu-layout">
        <section class="cards-grid">
            <article class="menu-card featured card-private">
                <div class="card-illustration dice-stack">
                    <div class="platform"></div>
                    <div class="dice cube-one"></div>
                    <div class="dice cube-two"></div>
                </div>
                <div class="card-title blue">BÀN RIÊNG</div>
                <div class="action-row">
                    <button type="button" class="action-button" id="createRoomButton">TẠO PHÒNG</button>
                    <button type="button" class="action-button" id="joinRoomButton">VÀO PHÒNG</button>
                </div>
                <div class="action-row">
                    <input type="text" id="roomCodeInput" class="room-code-input" placeholder="Mã phòng" aria-label="Mã phòng">
                </div>
                <p id="roomActionStatus" class="menu-status"></p>
            </article>

            <article class="menu-card featured card-play">
                <div class="card-illustration globe-wrap">
                    <div class="orbit orbit-a"></div>
                    <div class="orbit orbit-b"></div>
                    <div class="orbit orbit-c"></div>
                    <div class="globe-core"></div>
                </div>
                <div class="card-title green">CHƠI</div>
                <div class="action-row">
                    <button type="button" class="action-button" data-route="/play-vs-ai">ĐẤU MÁY</button>
                    <button type="button" class="action-button" data-route="/friends">BẠN BÈ</button>
                </div>
            </article>

            <article class="menu-card support" data-route="/shop">
                <div class="card-illustration mini store-scene">
                    <div class="store-roof"></div>
                    <div class="store-body"></div>
                    <div class="store-door"></div>
                </div>
                <div class="card-title yellow compact">CỬA HÀNG</div>
            </article>

            <article class="menu-card support" data-route="/friends">
                <div class="card-illustration mini friends-scene">
                    <span class="friends-icon" aria-hidden="true">👥</span>
                </div>
                <div class="card-title blue compact">BẠN BÈ</div>
            </article>
        </section>
    </main>
    
    <!-- Friends Modal -->
    <div id="friendsModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: var(--bg-dark, #2a2a3e); padding: 24px; border-radius: 16px; width: 90%; max-width: 500px; color: white; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 22px;">Bạn bè</h2>
                <button type="button" id="closeFriendsBtn" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">✕</button>
            </div>

            <!-- Add Friend -->
            <div style="display: flex; gap: 10px; margin-bottom: 24px;">
                <input type="text" id="addFriendInput" placeholder="Nhập tên người dùng cần kết bạn" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #3a3a4e; background: #1a1a2e; color: white;">
                <button type="button" id="sendFriendRequestBtn" style="padding: 12px 20px; border-radius: 8px; border: none; background: #67b738; color: white; font-weight: bold; cursor: pointer;">Gửi</button>
            </div>
            <p id="friendActionStatus" style="color: #ff5252; font-size: 14px; margin-top: -16px; margin-bottom: 16px; display: none;"></p>

            <!-- Pending Requests -->
            <h3 style="font-size: 16px; color: #aaa; margin-bottom: 12px; border-bottom: 1px solid #3a3a4e; padding-bottom: 6px;">Lời mời kết bạn</h3>
            <div id="pendingRequestsList" style="max-height: 150px; overflow-y: auto; margin-bottom: 24px; display: flex; flex-direction: column; gap: 10px;">
                <div style="color: #444; font-style: italic;">Không có lời mời nào</div>
            </div>

            <!-- Friends List -->
            <h3 style="font-size: 16px; color: #aaa; margin-bottom: 12px; border-bottom: 1px solid #3a3a4e; padding-bottom: 6px;">Danh sách bạn bè</h3>
            <div id="friendsList" style="max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;">
                <div style="color: #444; font-style: italic;">Chưa có bạn bè</div>
            </div>
        </div>
    </div>
    
    <!-- Room Invite Modal -->
    <div id="roomInviteModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: var(--bg-dark, #2a2a3e); padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; color: white; display: flex; flex-direction: column; text-align: center;">
            <div style="font-size: 40px; margin-bottom: 10px;">🎲</div>
            <h2 style="margin: 0; font-size: 22px; margin-bottom: 10px;">Lời mời vào phòng!</h2>
            <p style="color: #ccc; margin-bottom: 24px;">Bạn <strong id="inviterNameDisplay" style="color: #67b738;">...</strong> đang rủ bạn tham gia vào phòng chơi của họ.</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button type="button" id="rejectRoomInviteBtn" style="padding: 12px 24px; border-radius: 8px; border: 1px solid #ea4335; background: transparent; color: #ea4335; font-weight: bold; cursor: pointer; font-family: Outfit;">Từ chối</button>
                <button type="button" id="acceptRoomInviteBtn" style="padding: 12px 24px; border-radius: 8px; border: none; background: #67b738; color: white; font-weight: bold; cursor: pointer; font-family: Outfit;">Vào phòng ngay</button>
            </div>
        </div>
    </div>
</div>
<script src="/js/main-menu.js?v=3"></script>
</body>
</html>
