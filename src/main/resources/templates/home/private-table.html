<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Ban Rieng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/private-table.css">
    <link rel="stylesheet" href="/character/character.css">
</head>
<body>
<div class="private-room">
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>
    <div class="bg-shape shape-c"></div>

    <header class="room-header">
        <div class="header-left">
            <button type="button" class="home-button" data-action="home" aria-label="Trang chu">⌂</button>
            <section class="player-banner">
                <div class="player-avatar-frame">
                    <div class="player-avatar" id="playerAvatar">RG</div>
                </div>
                <div class="player-info">
                    <div class="player-name-ribbon" id="playerName">REN GROUP</div>
                    <div class="player-stats">
                        <span class="stat-pill"><strong id="playerCoins">0</strong><em>Xu</em></span>
                        <span class="stat-pill"><strong id="playerTickets">0</strong><em>Ve</em></span>
                    </div>
                </div>
            </section>
        </div>

        <div class="room-title">PRIVATE TABLE</div>

        <nav class="header-icons" aria-label="Dieu huong dau trang">
            <button type="button" class="circle-icon" data-action="shop" aria-label="Cua hang">🛒</button>
            <button type="button" class="circle-icon" data-action="menu" aria-label="Menu">☰</button>
            <button type="button" class="circle-icon" data-action="settings" aria-label="Cai dat">⚙</button>
            <button type="button" class="circle-icon close" data-action="close" aria-label="Dong">✕</button>
        </nav>
    </header>

    <section class="top-controls">
        <div class="settings-bar room-settings-display">
            <div class="settings-label">TABLE SETTINGS</div>
            <button type="button" class="icon-chip" id="roomVisibilityIndicator" aria-label="Che do phong">👁</button>
            <div class="room-code-display"><strong id="roomCode">-</strong></div>
            <button type="button" class="icon-chip" data-action="copy-code" aria-label="Sao chep ma phong">⧉</button>
        </div>
    </section>

    <section class="invite-friends-bar" id="inviteFriendsPanel" aria-label="Mời bạn bè">
        <div class="invite-friends-head">
            <span class="invite-friends-title">Mời bạn bè</span>
            <a class="invite-friends-link" href="/friends" data-action="friends-page">Quản lý bạn bè</a>
        </div>
        <ul id="inviteFriendsList" class="invite-friends-list"></ul>
        <p id="inviteFriendsHint" class="invite-friends-hint"></p>
    </section>

    <main class="room-layout room-layout-wide">
        <section class="slots-area">
            <section class="hero-selection-panel">
                <div class="hero-selection-header">
                    <div class="hero-current-media">
                        <img id="selectedHeroImage" class="hero-current-image" src="" alt="Hero hien tai">
                        <div id="selectedHeroSvgHost" class="hero-current-svg-host" hidden></div>
                        <div id="heroEmptyState" class="hero-empty-state">No hero selected</div>
                    </div>
                    <div class="hero-current-info">
                        <div class="hero-current-label">Selected Hero</div>
                        <div id="selectedHeroName" class="hero-current-name">No hero selected</div>
                    </div>
                    <div id="heroSkillPanel" class="hero-skill-panel" hidden>
                        <div class="hero-skill-eyebrow">Kỹ năng</div>
                        <div id="selectedHeroSkillName" class="hero-skill-name"></div>
                        <p id="selectedHeroSkillDesc" class="hero-skill-desc"></p>
                        <div id="selectedHeroSkillCd" class="hero-skill-cd"></div>
                    </div>
                </div>
                <div id="heroList" class="hero-list"></div>
            </section>
            <div id="playerSlots" class="slots-grid"></div>
            <div class="room-footer-status">
                <button type="button" class="play-button" id="readyButton" data-action="ready">READY</button>
                <p id="playerCount" class="room-count">0/4 players</p>
                <p id="tableStatus" class="table-status"></p>
            </div>
        </section>
    </main>
</div>
<script src="/js/hero-system.js"></script>
<script src="/js/private-table.js"></script>
</body>
</html>
