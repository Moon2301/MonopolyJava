<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Cài Đặt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/settings.css">
</head>
<body>
<main class="settings-page">
    <section class="panel settings-panel">
        <p class="section-tag">Tùy chọn</p>
        <h1>Cài Đặt</h1>

        <div class="setting-row">
            <div><strong>Hiệu ứng âm thanh</strong><span>Bật tắt hiệu ứng trong game</span></div>
            <label class="switch"><input type="checkbox" checked><span></span></label>
        </div>

        <div class="setting-row">
            <div><strong>Nhạc nền</strong><span>Bật tắt nhạc nền</span></div>
            <label class="switch"><input type="checkbox" checked><span></span></label>
        </div>

        <div class="setting-row">
            <div><strong>Toàn màn hình</strong><span>Mở rộng trò chơi ra toàn màn hình</span></div>
            <label class="switch"><input type="checkbox"><span></span></label>
        </div>

        <div class="setting-row language-row">
            <div><strong>Ngôn ngữ</strong><span>Chọn ngôn ngữ hiển thị</span></div>
            <select>
                <option>Tiếng Anh</option>
                <option>Tiếng Việt</option>
                <option>Tiếng Nhật</option>
            </select>
        </div>
    </section>
</main>
<script src="/js/settings.js"></script>
</body>
</html>
