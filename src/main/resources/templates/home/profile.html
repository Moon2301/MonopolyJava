<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Hồ Sơ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
<main class="profile-page">
    <section class="panel hero-panel">
        <div class="profile-head">
            <div class="avatar">P</div>
            <div>
                <p class="section-tag">Hồ sơ người chơi</p>
                <h1>Tên người chơi</h1>
                <span class="coin-badge">18.450 Xu</span>
            </div>
        </div>
    </section>

    <section class="panel stats-panel">
        <p class="section-tag">Thống kê</p>
        <div class="stats-grid">
            <div class="stat-card"><strong>128</strong><span>Trận đấu</span></div>
            <div class="stat-card"><strong>67%</strong><span>Tỷ lệ thắng</span></div>
            <div class="stat-card"><strong>42</strong><span>Tài sản đã thắng</span></div>
            <div class="stat-card"><strong>12</strong><span>Giải đấu</span></div>
        </div>
    </section>

    <section class="panel inventory-panel">
        <p class="section-tag">Kho đồ</p>
        <div class="inventory-grid">
            <div class="inventory-item">Xúc xắc vàng</div>
            <div class="inventory-item">Quân cờ neon</div>
            <div class="inventory-item">Giao diện bàn cờ VIP</div>
            <div class="inventory-item">Gói thẻ may mắn</div>
        </div>
    </section>

    <aside class="panel achievements-panel">
        <p class="section-tag">Thành tích</p>
        <div class="achievement-list">
            <div class="achievement">Chiến thắng đầu tiên</div>
            <div class="achievement">Nhà sưu tầm tài sản</div>
            <div class="achievement">Bậc thầy tiền thuê</div>
            <div class="achievement">Vào chung kết giải đấu</div>
        </div>
    </aside>
</main>
<script src="/js/profile.js"></script>
</body>
</html>
