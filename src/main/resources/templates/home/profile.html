<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Hồ Sơ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
<main class="profile-page">
    <section class="panel hero-panel">
        <div class="profile-head">
            <div class="avatar-wrap">
                <div class="avatar" id="profileAvatar">P</div>
                <button type="button" id="editAvatarButton" class="edit-avatar-btn">
                    Sửa avatar
                </button>
                <input type="file" id="avatarFileInput" class="avatar-file-input" accept="image/*" hidden>
                <p id="avatarStatus" class="avatar-status" aria-live="polite"></p>
            </div>
            <div>
                <p class="section-tag">Hồ sơ người dùng</p>
                <h1 id="profileUsername">Tên người chơi</h1>
                <div class="badges-row">
                    <span id="profileCoins" class="coin-badge">0 Xu</span>
                    <span id="profileTickets" class="coin-badge tickets-badge">0 Vé</span>
                </div>

                <div class="profile-actions">
                    <a class="profile-action-link" href="/game-history">Lịch sử đấu</a>
                </div>
            </div>
        </div>
    </section>

    <section class="equipped-character-card">
        <p class="section-tag">Nhân vật đang sử dụng</p>
        <div class="equipped-character-content">
            <img id="equippedCharacterImage" class="equipped-character-image" alt="Hình nhân vật">
            <div id="equippedCharacterName" class="equipped-character-name">-</div>
        </div>
    </section>

    <section class="panel stats-panel">
        <p class="section-tag">Thống kê</p>
        <div class="stats-grid">
            <div class="stat-card"><strong id="statMatches">0</strong><span>Trận đấu</span></div>
            <div class="stat-card"><strong id="statWinRate">0%</strong><span>Tỷ lệ thắng</span></div>
            <div class="stat-card"><strong id="statRankTier">-</strong><span>Hạng</span></div>
        </div>
    </section>
</main>
<script src="/js/profile.js"></script>
</body>
</html>
