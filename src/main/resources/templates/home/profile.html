<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Hồ Sơ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
<main class="profile-page">
    <section class="panel hero-panel">
        <div class="profile-head">
            <div class="avatar-wrap">
                <div class="avatar" id="profileAvatar">P</div>
                <button type="button" id="editAvatarButton" class="edit-avatar-btn">
                    Sửa avatar
                </button>
                <input type="file" id="avatarFileInput" class="avatar-file-input" accept="image/*" hidden>
                <p id="avatarStatus" class="avatar-status" aria-live="polite"></p>
            </div>
            <div>
                <p class="section-tag">Hồ sơ người dùng</p>
                <h1 id="profileUsername">Tên người chơi</h1>
                <div class="badges-row">
                    <span id="profileCoins" class="coin-badge">0 Xu</span>
                    <span id="profileTickets" class="coin-badge tickets-badge">0 Vé</span>
                </div>

                <div class="profile-actions">
                    <button type="button" id="changeNameButton" class="profile-action-link change-name-btn">
                        Đổi tên <span class="rename-cost">(1.000 Xu)</span>
                    </button>
                    <a class="profile-action-link" href="/game-history">Lịch sử đấu</a>
                    <button type="button" id="logoutButton" class="profile-action-link logout-action-btn">Đăng xuất</button>
                </div>
                <p id="renameHint" class="rename-hint" aria-live="polite"></p>
            </div>
        </div>
    </section>

    <section class="equipped-character-card">
        <p class="section-tag">Nhân vật đang sử dụng</p>
        <p class="equipped-character-sub">Nhân vật mặc định khi vào bàn chơi</p>
        <div class="equipped-character-content">
            <img id="equippedCharacterImage" class="equipped-character-image" alt="Hình nhân vật" hidden>
            <div id="equippedCharacterName" class="equipped-character-name">-</div>
        </div>
    </section>

    <div id="renameModal" class="rename-modal" hidden aria-hidden="true" role="dialog" aria-labelledby="renameModalTitle">
        <div class="rename-modal__backdrop" data-close-rename="1"></div>
        <div class="rename-modal__panel">
            <h2 id="renameModalTitle" class="rename-modal__title">Đổi tên hiển thị</h2>
            <p class="rename-modal__cost">Phí: <strong>1.000 Xu</strong> (trừ ngay khi xác nhận)</p>
            <label class="rename-modal__label" for="renameInput">Tên mới</label>
            <input type="text" id="renameInput" class="rename-modal__input" maxlength="80" autocomplete="nickname" placeholder="Nhập tên hiển thị mới">
            <p id="renameModalError" class="rename-modal__error" role="alert"></p>
            <div class="rename-modal__actions">
                <button type="button" class="rename-modal__btn rename-modal__btn--ghost" data-close-rename="1">Hủy</button>
                <button type="button" id="renameConfirmButton" class="rename-modal__btn rename-modal__btn--primary">Xác nhận đổi tên</button>
            </div>
        </div>
    </div>

    <section class="panel stats-panel">
        <p class="section-tag">Thống kê</p>
        <div class="stats-grid">
            <div class="stat-card"><strong id="statMatches">0</strong><span>Trận đấu</span></div>
            <div class="stat-card"><strong id="statWinRate">0%</strong><span>Tỷ lệ thắng</span></div>
            <div class="stat-card"><strong id="statRankTier">-</strong><span>Hạng</span></div>
        </div>
    </section>
</main>
<script src="/js/profile.js"></script>
</body>
</html>
