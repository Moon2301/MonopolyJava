<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shop.css">
</head>
<body>
<main class="shop-page">
    <header class="shop-header">
        <p class="section-tag">Cửa hàng tướng</p>
        <h1>Cửa Hàng</h1>
    </header>
    <section class="shop-grid">
        <article class="shop-card">
            <div class="hero-image hero-a"></div>
            <h2>Đại Gia Neon</h2>
            <p>2.500 Xu</p>
            <button type="button">Mua</button>
        </article>
        <article class="shop-card">
            <div class="hero-image hero-b"></div>
            <h2>Chiến Binh Xúc Xắc</h2>
            <p>3.200 Xu</p>
            <button type="button">Mua</button>
        </article>
        <article class="shop-card">
            <div class="hero-image hero-c"></div>
            <h2>Nữ Hoàng Tiền Thuê</h2>
            <p>4.100 Xu</p>
            <button type="button">Mua</button>
        </article>
        <article class="shop-card">
            <div class="hero-image hero-d"></div>
            <h2>Bóng Ma Bàn Cờ</h2>
            <p>5.700 Xu</p>
            <button type="button">Mua</button>
        </article>
        <article class="shop-card">
            <div class="hero-image hero-e"></div>
            <h2>Kỹ Sư Bản Đồ</h2>
            <p>2.950 Xu</p>
            <button type="button">Mua</button>
        </article>
        <article class="shop-card">
            <div class="hero-image hero-f"></div>
            <h2>Bá Tước May Mắn</h2>
            <p>6.000 Xu</p>
            <button type="button">Mua</button>
        </article>
    </section>
</main>
<script src="/js/shop.js"></script>
</body>
</html>
