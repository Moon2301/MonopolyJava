<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nạp Xu qua VNPay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/topup.css">
</head>
<body>
<main class="topup-page">
    <header class="topup-header">
        <button type="button" id="backButton" class="back-button" aria-label="Quay về">← Quay về</button>
        <p class="section-tag">VNPay Gateway</p>
        <h1>Nạp Xu</h1>
        <p class="topup-subtitle">Thanh toán an toàn, nhận Xu ngay lập tức</p>
    </header>

    <div class="topup-grid">
        <!-- Paquet 1 -->
        <article class="topup-card" data-amount="50000">
            <div class="coin-icon">💰</div>
            <div class="package-xu">500 Xu</div>
            <div class="package-price">50.000 VNĐ</div>
        </article>
        <!-- Paquet 2 -->
        <article class="topup-card" data-amount="100000">
            <div class="coin-icon">💰💰</div>
            <div class="package-xu">1.000 Xu</div>
            <div class="package-price">100.000 VNĐ</div>
        </article>
        <!-- Paquet 3 -->
        <article class="topup-card featured" data-amount="200000">
            <div class="coin-icon">👑</div>
            <div class="package-xu">2.000 Xu</div>
            <div class="package-price">200.000 VNĐ</div>
        </article>
        <!-- Paquet 4 -->
        <article class="topup-card" data-amount="500000">
            <div class="coin-icon">💎</div>
            <div class="package-xu">5.000 Xu</div>
            <div class="package-price">500.000 VNĐ</div>
        </article>
        <!-- Paquet 5 -->
        <article class="topup-card" data-amount="1000000">
            <div class="coin-icon">🏆</div>
            <div class="package-xu">10.000 Xu</div>
            <div class="package-price">1.000.000 VNĐ</div>
        </article>
        <!-- Paquet 6 -->
        <article class="topup-card premium" data-amount="2000000">
            <div class="coin-icon">🌟</div>
            <div class="package-xu">20.000 Xu</div>
            <div class="package-price">2.000.000 VNĐ</div>
        </article>
    </div>

</main>
<script src="/js/topup.js"></script>
</body>
</html>
