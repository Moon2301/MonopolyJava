<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Ban Rieng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/private-table.css">
</head>
<body>
<div class="private-room">
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>
    <div class="bg-shape shape-c"></div>

    <header class="room-header">
        <div class="header-left">
            <button type="button" class="home-button" data-action="home" aria-label="Trang chu">⌂</button>
            <section class="player-banner">
                <div class="player-avatar-frame">
                    <div class="player-avatar" id="playerAvatar">RG</div>
                </div>
                <div class="player-info">
                    <div class="player-name-ribbon" id="playerName">REN GROUP</div>
                    <div class="player-stats">
                        <span class="stat-pill"><strong id="playerCoins">0</strong><em>Xu</em></span>
                        <span class="stat-pill"><strong id="playerTickets">0</strong><em>Ve</em></span>
                    </div>
                </div>
            </section>
        </div>

        <div class="room-title">PRIVATE TABLE</div>

        <nav class="header-icons" aria-label="Dieu huong dau trang">
            <button type="button" class="circle-icon" data-action="invite" aria-label="Khach moi" title="Mời người chơi">👥</button>
            <button type="button" class="circle-icon" data-action="shop" aria-label="Cua hang">🛒</button>
            <button type="button" class="circle-icon" data-action="menu" aria-label="Menu">☰</button>
            <button type="button" class="circle-icon" data-action="settings" aria-label="Cai dat">⚙</button>
            <button type="button" class="circle-icon close" data-action="close" aria-label="Dong">✕</button>
        </nav>
    </header>

    <section class="top-controls">
        <div class="settings-bar room-settings-display">
            <div class="settings-label">TABLE SETTINGS</div>
            <button type="button" class="icon-chip" id="roomVisibilityIndicator" aria-label="Che do phong">👁</button>
            <div class="room-code-display">Room: <strong id="roomCode">-</strong></div>
            <button type="button" class="icon-chip" data-action="copy-code" aria-label="Sao chep ma phong">⧉</button>
        </div>

        <div class="mode-buttons" id="modeButtons">
            <button type="button" class="mode-button" data-mode="TWO_VS_TWO">2X2</button>
            <button type="button" class="mode-button" data-mode="QUICK_GAME">QUICK GAME</button>
            <button type="button" class="mode-button" data-mode="NO_GADGETS">NO GADGETS</button>
            <button type="button" class="mode-button" data-mode="FANTASY">FANTASY</button>
        </div>
    </section>

    <main class="room-layout room-layout-wide">
        <section class="slots-area">
            <section class="hero-selection-panel">
                <div class="hero-selection-header">
                    <div class="hero-current-media">
                        <img id="selectedHeroImage" class="hero-current-image" src="" alt="Hero hien tai">
                        <div id="heroEmptyState" class="hero-empty-state">No hero selected</div>
                    </div>
                    <div class="hero-current-info">
                        <div class="hero-current-label">Selected Hero</div>
                        <div id="selectedHeroName" class="hero-current-name">No hero selected</div>
                    </div>
                </div>
                <div id="heroList" class="hero-list"></div>
            </section>
            <div id="playerSlots" class="slots-grid"></div>
            <div class="room-footer-status">
                <button type="button" class="play-button" id="readyButton" data-action="ready">READY</button>
                <button type="button" class="play-button" id="startButton" data-action="start" style="display: none; background: #67b738;">START GAME</button>
                <p id="playerCount" class="room-count">0/4 players</p>
                <p id="tableStatus" class="table-status"></p>
            </div>
        </section>
    </main>
        </section>
    </main>
    
    <!-- Invite Friend Modal -->
    <div id="inviteModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 100; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: var(--bg-dark, #2a2a3e); padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; color: white; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 20px;">Mời bè bạn</h2>
                <button type="button" id="closeInviteModalBtn" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">✕</button>
            </div>
            
            <!-- Friend List container -->
            <div id="friendsInviteList" style="max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-right: 4px;">
                <div style="color: #888; font-style: italic; text-align: center;">Đang tải danh sách...</div>
            </div>

            <!-- Manual Input Fallback -->
            <div style="border-top: 1px solid #3a3a4e; padding-top: 16px;">
                <h3 style="font-size: 14px; color: #aaa; margin-top: 0; margin-bottom: 12px; font-weight: normal;">Hoặc mời bằng ID:</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="inviteUsernameInput" placeholder="Nhập tên người chơi khác" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #3a3a4e; background: #1a1a2e; color: white; font-size: 14px;">
                    <button type="button" id="confirmInviteBtn" style="padding: 10px 16px; border-radius: 8px; border: none; background: #67b738; color: white; font-weight: bold; cursor: pointer;">Mời</button>
                </div>
            </div>
            <p id="inviteError" style="color: #ff5252; font-size: 14px; margin-top: 12px; margin-bottom: 0; display: none; text-align: center;"></p>
        </div>
    </div>
</div>
<script src="/js/private-table.js?v=4"></script>
</body>
</html>
